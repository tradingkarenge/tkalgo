name: Build Obfuscated Executables

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]   # add windows-latest if needed
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyArmor & PyInstaller
        run: pip install pyarmor pyinstaller

      - name: Obfuscate scripts (makes them unreadable)
        run: pyarmor gen client_app.py tkalgo_security.py

      - name: Build executable from obfuscated code
        run: |
          cd dist
          pyinstaller --onefile --name tkalgo_client \
            --hidden-import=json \
            --hidden-import=tkinter \
            --hidden-import=os \
            --hidden-import=sys \
            client_app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tkalgo-${{ runner.os }}
          path: dist/dist/tkalgo_client
