name: Build Obfuscated Ubuntu Executable

on:
  workflow_dispatch:    # manual trigger (you click "Run workflow")
  push:                 # optional: also runs when you push to main
    branches: [ main ]

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyArmor and PyInstaller
        run: |
          pip install pyarmor pyinstaller --break-system-packages

      - name: Obfuscate scripts (makes them unreadable)
        run: pyarmor gen client_app.py tkalgo_security.py

      - name: Build Linux executable
        run: |
          cd dist
          pyinstaller --onefile --name newtkalgo \
            --hidden-import=requests \
            --hidden-import=json \
            --hidden-import=tkinter \
            --hidden-import=os \
            --hidden-import=sys \
            --hidden-import=time \
            --hidden-import=threading \
            --hidden-import=socketio \
            --hidden-import=engineio \
            --hidden-import=tkalgo_security \
            client_app.py

      - name: Upload artifact (the final executable)
        uses: actions/upload-artifact@v4
        with:
          name: newtkalgo-ubuntu
          path: dist/dist/newtkalgo
